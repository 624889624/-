<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>手机简易计算器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "微软雅黑", sans-serif;
            max-width: 400px;
            margin: 20px auto;
            padding: 0 15px;
        }
        .calculator {
            background: #2d2d2d;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        #result {
            width: 100%;
            height: 80px;
            background: #f5f5f5;
            border: none;
            border-radius: 10px;
            margin-bottom: 20px;
            padding: 0 20px;
            font-size: 28px;
            text-align: right;
            color: #2d2d2d;
            pointer-events: none;
        }
        .btn-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .btn {
            height: 60px;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        .num-btn {
            background: #4a4a4a;
        }
        .op-btn {
            background: #ff9f0a;
        }
        .clear-btn {
            background: #ff3b30;
        }
        .eq-btn {
            grid-column: span 2;
            background: #34c759;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="result" value="0">
        <div class="btn-group">
            <button class="btn clear-btn" onclick="clearResult()">C</button>
            <button class="btn op-btn" onclick="appendChar('/')">÷</button>
            <button class="btn op-btn" onclick="appendChar('*')">×</button>
            <button class="btn op-btn" onclick="appendChar('-')">-</button>

            <button class="btn num-btn" onclick="appendChar('7')">7</button>
            <button class="btn num-btn" onclick="appendChar('8')">8</button>
            <button class="btn num-btn" onclick="appendChar('9')">9</button>
            <button class="btn op-btn" onclick="appendChar('+')">+</button>

            <button class="btn num-btn" onclick="appendChar('4')">4</button>
            <button class="btn num-btn" onclick="appendChar('5')">5</button>
            <button class="btn num-btn" onclick="appendChar('6')">6</button>
            <button class="btn eq-btn" onclick="calculate()">=</button>

            <button class="btn num-btn" onclick="appendChar('1')">1</button>
            <button class="btn num-btn" onclick="appendChar('2')">2</button>
            <button class="btn num-btn" onclick="appendChar('3')">3</button>

            <button class="btn num-btn" onclick="appendChar('0')">0</button>
            <button class="btn num-btn" onclick="appendChar('.')">.</button>
        </div>
    </div>

    <script>
        let result = document.getElementById('result');
        function appendChar(char) {
            if (result.value === '0') {
                result.value = char;
            } else {
                result.value += char;
            }
        }
        function clearResult() {
            result.value = '0';
        }
        function calculate() {
            try {
                // 替换×为*，适配JS计算
                let expr = result.value.replace('×', '*');
                result.value = eval(expr);
            } catch (e) {
                result.value = '错误';
            }
        }
    </script>
</body>
</html>
